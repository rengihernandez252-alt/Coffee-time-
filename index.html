<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Time</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: Arial, sans-serif; 
            background: #f8f3ed;
            color: #3e2723;
        }
        
        header { 
            background: #6f4e37; 
            color: white; 
            padding: 40px 20px; 
            text-align: center; 
        }
        
        header h1 { font-size: 3em; margin-bottom: 10px; }
        
        .contenido {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }
        
        .card {
            background: white;
            padding: 30px;
            margin: 20px 0;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .btn {
            background: #6f4e37;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
        }
        
        footer {
            background: #3e2723;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <header>
        <h1>☕ Coffee Time</h1>
        <p>Tu momento, tu café</p>
    </header>
    
    <div class="contenido">
        <div class="card">
            <h2>Bienvenidos a Coffee Time</h2>
            <p>Somos tu cafetería de confianza. Café de especialidad, postres caseros y el mejor ambiente para disfrutar.</p>
            <button class="btn">Ver Menú</button>
        </div>
        
        <div class="card">
            <h2>Horarios</h2>
            <p>Lunes a Viernes: 7:00 AM - 8:00 PM</p>
            <p>Sábados y Domingos: 8:00 AM - 9:00 PM</p>
        </div>
    </div>
    
    <footer>
        <p>Coffee Time © 2026 | Hecho con ☕</p>
    </footer>
</body>
</html>
